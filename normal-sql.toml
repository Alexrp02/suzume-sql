# normal-sql connection config.
#
# Run with:   normal-sql                 (uses ./normal-sql.toml; shows a picker)
#             normal-sql local           (open the connection named "local")
#             normal-sql -c path.toml     (use a different config file)

[[connections]]
name = "local"
engine = "sqlite"
path = "./demo.db"

